name: Lint

on:
  push:
  pull_request:

jobs:
  php-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: PHP syntax check
        run: find . -path ./vendor -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l
